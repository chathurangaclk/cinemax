<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMax</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e50914;
            --red-dark: #b20710;
            --bg: #080808;
            --card: #111111;
            --card2: #1a1a1a;
            --text: #ffffff;
            --muted: #888888;
            --gold: #f5c518;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            background: linear-gradient(180deg, #000000ee 0%, transparent 100%);
            padding: 18px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 200;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #ffffff08;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            color: var(--red);
            letter-spacing: 2px;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s;
        }
        .logo:hover { opacity: 0.85; }
        .logo span { color: #fff; }

        .search-wrap {
            display: flex;
            align-items: center;
            background: #ffffff10;
            border: 1px solid #ffffff15;
            border-radius: 30px;
            overflow: hidden;
            transition: border 0.2s;
        }
        .search-wrap:focus-within { border-color: var(--red); }
        .search-wrap input {
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            padding: 11px 20px;
            font-size: 14px;
            width: 280px;
            font-family: 'DM Sans', sans-serif;
        }
        .search-wrap input::placeholder { color: var(--muted); }
        .search-wrap button {
            background: var(--red);
            border: none;
            color: #fff;
            padding: 11px 22px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            transition: background 0.2s;
        }
        .search-wrap button:hover { background: var(--red-dark); }

        /* GENRES */
        .genres {
            display: flex;
            gap: 10px;
            padding: 25px 50px 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .genres::-webkit-scrollbar { display: none; }
        .genre-btn {
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            color: var(--muted);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .genre-btn:hover, .genre-btn.active {
            background: var(--red);
            border-color: var(--red);
            color: #fff;
        }

        /* SECTION */
        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            letter-spacing: 2px;
            padding: 20px 50px 15px;
            color: #fff;
        }
        .section-title span { color: var(--red); }

        /* GRID */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
            gap: 18px;
            padding: 0 50px 60px;
        }

        .movie-card {
            background: var(--card);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s;
            position: relative;
        }
        .movie-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px #00000088;
        }
        .movie-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
        }
        .movie-card .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, transparent 50%, #000000cc 100%);
            opacity: 0;
            transition: opacity 0.25s;
            display: flex;
            align-items: flex-end;
            padding: 15px;
        }
        .movie-card:hover .overlay { opacity: 1; }
        .overlay-play {
            background: var(--red);
            border-radius: 50%;
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }
        .movie-info { padding: 12px; }
        .movie-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .rating {
            color: var(--gold);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .rating:hover { opacity: 0.75; }
        .year { color: var(--muted); font-size: 12px; }

        /* LOADING */
        .loading {
            grid-column: 1/-1;
            text-align: center;
            padding: 80px;
            color: var(--muted);
            font-size: 16px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #333;
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #000000cc;
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.active { display: flex; }

        .modal-box {
            background: #141414;
            border-radius: 16px;
            max-width: 750px;
            width: 100%;
            overflow: hidden;
            position: relative;
            animation: modalIn 0.25s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes modalIn {
            from { transform: scale(0.92); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-banner {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
        }
        .modal-banner-gradient {
            position: relative;
            margin-bottom: -60px;
        }
        .modal-banner-gradient::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 120px;
            background: linear-gradient(transparent, #141414);
        }

        .modal-body { padding: 0 30px 30px; }
        .modal-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 34px;
            letter-spacing: 2px;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }
        .modal-meta {
            display: flex;
            gap: 15px;
            align-items: center;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .modal-meta .imdb-badge {
            background: var(--gold);
            color: #000;
            padding: 3px 10px;
            border-radius: 5px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.2s;
            text-decoration: none;
        }
        .modal-meta .imdb-badge:hover { opacity: 0.85; }

        .modal-overview {
            color: #cccccc;
            line-height: 1.7;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .modal-actions { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-red { background: var(--red); color: #fff; }
        .btn-red:hover { background: var(--red-dark); }
        .btn-outline {
            background: transparent;
            color: #fff;
            border: 1px solid #444;
        }
        .btn-outline:hover { border-color: #fff; }

        .modal-close {
            position: absolute;
            top: 15px; right: 15px;
            background: #00000088;
            border: none;
            color: #fff;
            width: 36px; height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            z-index: 10;
            transition: background 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-close:hover { background: var(--red); }

        /* IMDB POPUP */
        .imdb-popup {
            display: none;
            position: fixed;
            inset: 0;
            background: #000000bb;
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .imdb-popup.active { display: flex; }
        .imdb-frame-box {
            background: #1a1a1a;
            border-radius: 12px;
            width: 100%;
            max-width: 900px;
            height: 80vh;
            overflow: hidden;
            position: relative;
        }
        .imdb-frame-box iframe {
            width: 100%; height: 100%;
            border: none;
        }
        .imdb-close {
            position: absolute;
            top: 10px; right: 10px;
            background: var(--red);
            border: none;
            color: #fff;
            width: 36px; height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }
        .imdb-open-link {
            display: block;
            text-align: center;
            padding: 12px;
            background: #111;
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
        .imdb-open-link:hover { background: #1a1a1a; }

        /* TRAILER POPUP */
        .trailer-popup {
            display: none;
            position: fixed;
            inset: 0;
            background: #000000dd;
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .trailer-popup.active { display: flex; }
        .trailer-box {
            background: #000;
            border-radius: 12px;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16/9;
            overflow: hidden;
            position: relative;
        }
        .trailer-box iframe {
            width: 100%; height: 100%;
            border: none;
        }
        .trailer-close {
            position: absolute;
            top: -45px; right: 0;
            background: var(--red);
            border: none;
            color: #fff;
            width: 36px; height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="goHome()">CINE<span>MAX</span></div>
    <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Search movies..." />
        <button onclick="searchMovies()">Search</button>
    </div>
</header>

<div class="genres" id="genreBar">
    <button class="genre-btn active" onclick="loadTrending(this)">🔥 Trending</button>
    <button class="genre-btn" onclick="loadGenre(28, this)">💥 Action</button>
    <button class="genre-btn" onclick="loadGenre(35, this)">😂 Comedy</button>
    <button class="genre-btn" onclick="loadGenre(27, this)">👻 Horror</button>
    <button class="genre-btn" onclick="loadGenre(878, this)">🚀 Sci-Fi</button>
    <button class="genre-btn" onclick="loadGenre(18, this)">🎭 Drama</button>
    <button class="genre-btn" onclick="loadGenre(10749, this)">❤️ Romance</button>
    <button class="genre-btn" onclick="loadGenre(16, this)">🎨 Animation</button>
    <button class="genre-btn" onclick="loadGenre(53, this)">🔪 Thriller</button>
    <button class="genre-btn" onclick="loadGenre(12, this)">🗺️ Adventure</button>
    <button class="genre-btn" onclick="loadGenre(14, this)">🧙 Fantasy</button>
</div>

<div class="section-title" id="sectionTitle">🔥 <span>TRENDING</span> now</div>
<div class="movies-grid" id="moviesGrid">
    <div class="loading">
        <div class="spinner"></div>
        Loading movies...
    </div>
</div>

<!-- Movie Modal -->
<div class="modal-overlay" id="movieModal" onclick="closeModal(event)">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModalBtn()">✕</button>
        <div class="modal-banner-gradient">
            <img id="modalBanner" class="modal-banner" src="" alt="">
        </div>
        <div class="modal-body">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-meta" id="modalMeta"></div>
            <div class="modal-overview" id="modalOverview"></div>
            <div class="modal-actions">
                <button class="btn btn-red" onclick="openTrailer()">▶ Watch Trailer</button>
                <a id="downloadBtn" class="btn btn-outline" href="#" target="_blank">⬇ Download Search</a>
            </div>
        </div>
    </div>
</div>

<!-- IMDB Popup -->
<div class="imdb-popup" id="imdbPopup" onclick="closeImdb(event)">
    <div class="imdb-frame-box">
        <button class="imdb-close" onclick="closeImdbBtn()">✕</button>
        <a id="imdbDirectLink" href="#" target="_blank" class="imdb-open-link">🔗 Open IMDB directly</a>
        <iframe id="imdbFrame" src="" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
    </div>
</div>

<!-- Trailer Popup -->
<div class="trailer-popup" id="trailerPopup" onclick="closeTrailer(event)">
    <div class="trailer-box">
        <button class="trailer-close" onclick="closeTrailerBtn()">✕</button>
        <iframe id="trailerFrame" src="" allowfullscreen allow="autoplay"></iframe>
    </div>
</div>

<script>
    const API_KEY = '24488a14feb967fbdda86843e2f80cae';
    const BASE = 'https://api.themoviedb.org/3';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    const IMG_BIG = 'https://image.tmdb.org/t/p/original';

    let currentMovie = null;
    let currentImdbId = null;

    async function fetchMovies(url) {
        const res = await fetch(url);
        const data = await res.json();
        return data.results || [];
    }

    function showLoading() {
        document.getElementById('moviesGrid').innerHTML = `
            <div class="loading">
                <div class="spinner"></div>
                Loading...
            </div>`;
    }

    function renderMovies(movies) {
        const grid = document.getElementById('moviesGrid');
        grid.innerHTML = '';
        if (!movies.length) {
            grid.innerHTML = '<div class="loading">No results found 😕</div>';
            return;
        }
        movies.forEach(movie => {
            if (!movie.poster_path) return;
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                <img src="${IMG}${movie.poster_path}" alt="${movie.title}" loading="lazy">
                <div class="overlay"><div class="overlay-play">▶</div></div>
                <div class="movie-info">
                    <div class="movie-title">${movie.title}</div>
                    <div class="movie-meta">
                        <span class="rating" onclick="openImdbFromCard(event, '${movie.id}')">⭐ ${movie.vote_average.toFixed(1)} IMDB</span>
                        <span class="year">${movie.release_date?.split('-')[0] || 'N/A'}</span>
                    </div>
                </div>
            `;
            card.addEventListener('click', () => openModal(movie));
            grid.appendChild(card);
        });
    }

    async function openModal(movie) {
        currentMovie = movie;
        const details = await fetch(`${BASE}/movie/${movie.id}?api_key=${API_KEY}&append_to_response=external_ids`).then(r => r.json());
        currentImdbId = details.external_ids?.imdb_id || null;

        document.getElementById('modalBanner').src = IMG_BIG + (movie.backdrop_path || movie.poster_path);
        document.getElementById('modalTitle').textContent = movie.title;

        const imdbLink = currentImdbId
            ? `<a href="#" onclick="openImdbPopup(event)" class="imdb-badge">⭐ ${movie.vote_average.toFixed(1)} IMDB</a>`
            : `<span>⭐ ${movie.vote_average.toFixed(1)}</span>`;

        document.getElementById('modalMeta').innerHTML = `
            ${imdbLink}
            <span>📅 ${movie.release_date?.split('-')[0] || 'N/A'}</span>
            <span>🌐 ${details.original_language?.toUpperCase()}</span>
            ${details.runtime ? `<span>⏱ ${details.runtime} min</span>` : ''}
        `;
        document.getElementById('modalOverview').textContent = movie.overview || 'No description available.';
        document.getElementById('downloadBtn').href = `https://yts.mx/movies/${movie.title.toLowerCase().replace(/ /g, '-')}`;
        document.getElementById('movieModal').classList.add('active');
    }

    function openImdbPopup(e) {
        e.preventDefault();
        if (!currentImdbId) return;
        const url = `https://www.imdb.com/title/${currentImdbId}/`;
        document.getElementById('imdbFrame').src = url;
        document.getElementById('imdbDirectLink').href = url;
        document.getElementById('imdbPopup').classList.add('active');
    }

    async function openImdbFromCard(e, movieId) {
        e.stopPropagation();
        const details = await fetch(`${BASE}/movie/${movieId}?api_key=${API_KEY}&append_to_response=external_ids`).then(r => r.json());
        const imdbId = details.external_ids?.imdb_id;
        if (!imdbId) return;
        const url = `https://www.imdb.com/title/${imdbId}/`;
        document.getElementById('imdbFrame').src = url;
        document.getElementById('imdbDirectLink').href = url;
        document.getElementById('imdbPopup').classList.add('active');
    }

    async function openTrailer() {
        if (!currentMovie) return;
        const data = await fetch(`${BASE}/movie/${currentMovie.id}/videos?api_key=${API_KEY}`).then(r => r.json());
        const trailer = data.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
        if (!trailer) { alert('Trailer not found 😕'); return; }
        document.getElementById('trailerFrame').src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
        document.getElementById('trailerPopup').classList.add('active');
    }

    function closeModal(e) { if (e.target === document.getElementById('movieModal')) closeModalBtn(); }
    function closeModalBtn() { document.getElementById('movieModal').classList.remove('active'); }

    function closeImdb(e) { if (e.target === document.getElementById('imdbPopup')) closeImdbBtn(); }
    function closeImdbBtn() {
        document.getElementById('imdbPopup').classList.remove('active');
        document.getElementById('imdbFrame').src = '';
    }

    function closeTrailer(e) { if (e.target === document.getElementById('trailerPopup')) closeTrailerBtn(); }
    function closeTrailerBtn() {
        document.getElementById('trailerPopup').classList.remove('active');
        document.getElementById('trailerFrame').src = '';
    }

    async function searchMovies() {
        const original = document.getElementById('searchInput').value.trim();
        if (!original) return;

        let q = original;
        let year = null;
        const yearMatch = q.match(/\b(19|20)\d{2}\b/);
        if (yearMatch) {
            year = yearMatch[0];
            q = q.replace(year, '').trim();
        }

        showLoading();
        document.getElementById('sectionTitle').innerHTML = `🔍 <span>"${original}"</span> Results`;
        setActiveGenre(null);

        let url = `${BASE}/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(q)}`;
        if (year) url += `&primary_release_year=${year}`;
        let movies = await fetchMovies(url);

        // Fallback 1 - without year filter, sort by year match
        if (!movies.length && year) {
            movies = await fetchMovies(`${BASE}/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(q)}`);
            movies = movies.sort((a, b) => {
                const aY = a.release_date?.startsWith(year) ? 0 : 1;
                const bY = b.release_date?.startsWith(year) ? 0 : 1;
                return aY - bY;
            });
        }

        // Fallback 2 - search full original query
        if (!movies.length) {
            movies = await fetchMovies(`${BASE}/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(original)}`);
        }

        renderMovies(movies);
    }

    document.getElementById('searchInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') searchMovies();
    });

    function setActiveGenre(btn) {
        document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
    }

    async function loadTrending(btn) {
        setActiveGenre(btn);
        showLoading();
        document.getElementById('sectionTitle').innerHTML = '🔥 <span>TRENDING</span> now';
        const movies = await fetchMovies(`${BASE}/trending/movie/week?api_key=${API_KEY}`);
        renderMovies(movies);
    }

    async function loadGenre(genreId, btn) {
        setActiveGenre(btn);
        showLoading();
        document.getElementById('sectionTitle').innerHTML = `🎬 <span>${btn.textContent}</span> Movies`;
        const movies = await fetchMovies(`${BASE}/discover/movie?api_key=${API_KEY}&with_genres=${genreId}&sort_by=popularity.desc`);
        renderMovies(movies);
    }

    function goHome() {
        document.getElementById('searchInput').value = '';
        document.querySelectorAll('.genre-btn')[0].click();
    }

    // Initial load
    loadTrending(document.querySelector('.genre-btn'));
</script>
</body>
</html>
